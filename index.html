<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>迷宮逃生</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="迷宮逃生遊戲">
        <div class="hud">
          <div>
            <span class="label">狀態</span>
            <strong id="statusText">準備</strong>
          </div>
          <div class="player-card">
            <span class="label" id="player1Label">P1 WASD</span>
            <strong id="player1State">準備</strong>
            <small id="player1Effects">無效果</small>
          </div>
          <div class="player-card">
            <span class="label" id="player2Label">P2 方向鍵</span>
            <strong id="player2State">準備</strong>
            <small id="player2Effects">無效果</small>
          </div>
          <div class="player-card">
            <span class="label" id="player3Label">P3 IJKL</span>
            <strong id="player3State">準備</strong>
            <small id="player3Effects">無效果</small>
          </div>
          <div>
            <span class="label">冰凍</span>
            <strong id="iceTimer">0.0</strong>
          </div>
          <button id="restartBtn" class="icon-btn" type="button" title="重新開始" aria-label="重新開始">↻</button>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="960" height="640" aria-label="迷宮"></canvas>
          <div id="overlay" class="overlay">
            <h1>迷宮逃生</h1>
            <div class="setup-controls" aria-label="玩家設定">
              <label>
                <span>總玩家數</span>
                <select id="playerCountSelect">
                  <option value="1">1 位</option>
                  <option value="2">2 位</option>
                  <option value="3" selected>3 位</option>
                </select>
              </label>
              <label>
                <span>P1</span>
                <select id="player1ModeSelect">
                  <option value="human">人類</option>
                  <option value="ai">AI</option>
                </select>
              </label>
              <label>
                <span>P2</span>
                <select id="player2ModeSelect">
                  <option value="human">人類</option>
                  <option value="ai">AI</option>
                </select>
              </label>
              <label>
                <span>P3</span>
                <select id="player3ModeSelect">
                  <option value="human">人類</option>
                  <option value="ai">AI</option>
                </select>
              </label>
              <label>
                <span>AI 難度</span>
                <select id="aiDifficultySelect">
                  <option value="easy">簡單</option>
                  <option value="normal" selected>普通</option>
                  <option value="hard">困難</option>
                </select>
              </label>
            </div>
            <button id="startBtn" type="button">開始</button>
          </div>
        </div>

        <div class="touch-pad" aria-label="方向控制">
          <button class="touch-btn" data-dir="up" type="button" aria-label="上">▲</button>
          <button class="touch-btn" data-dir="left" type="button" aria-label="左">◀</button>
          <button class="touch-btn" data-dir="down" type="button" aria-label="下">▼</button>
          <button class="touch-btn" data-dir="right" type="button" aria-label="右">▶</button>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
